# ===============================
# CONFIGURATION COMMUNE À TOUS LES MICROSERVICES EXCELO
# Ces configurations sont partagées par tous les services
# ===============================

# ===============================
# CONFIGURATION SPRING PROFILES
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ===============================
# CONFIGURATION SPRING CLOUD
# ===============================
spring.cloud.config.enabled=true
spring.cloud.discovery.enabled=true

# ===============================
# CONFIGURATION EUREKA (DÉCOUVERTE DE SERVICES)
# ===============================
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

# ===============================
# CONFIGURATION JPA/HIBERNATE COMMUNE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.main.allow-bean-definition-overriding=true

# ===============================
# CONFIGURATION REDIS DE BASE
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ===============================
# CONFIGURATION CACHE REDIS DE BASE
# ===============================
spring.cache.type=redis
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true

# ===============================
# CONFIGURATION KEYCLOAK/JWT COMMUNE
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/excelo}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/excelo/protocol/openid-connect/certs}

# ===============================
# CONFIGURATION ACTUATOR DE BASE
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===============================
# CONFIGURATION OPENFEIGN DE BASE
# ===============================
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=10000

# ===============================
# CONFIGURATION LOGGING DE BASE
# ===============================
logging.level.org.springframework.security=WARN
logging.level.org.springframework=INFO
