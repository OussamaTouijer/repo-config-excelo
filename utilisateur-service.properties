# ===============================
# UTILISATEUR-SERVICE - CONFIGURATION CENTRALISÉE
# Configuration pour le Config Server
# ===============================

# Application
spring.application.name=utilisateur-service
server.port=9001

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:excelo_utilisateur_service-db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:oussama}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

# Keycloak Configuration
keycloak.auth-server-url=${KEYCLOAK_SERVER_URL:http://localhost:8080}
keycloak.realm=${KEYCLOAK_REALM:excelo}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:excelo-app}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:excelo-app-secret}
keycloak.public-client=false
keycloak.bearer-only=false
keycloak.admin.client-id=admin-cli
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# Excelo Keycloak Properties
excelo.keycloak.enabled=true
excelo.keycloak.realm=${KEYCLOAK_REALM:excelo}
excelo.keycloak.auth-server-url=${KEYCLOAK_SERVER_URL:http://localhost:8080}
excelo.keycloak.client-id=${KEYCLOAK_CLIENT_ID:excelo-app}
excelo.keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
excelo.keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# JWT Configuration pour Spring Security
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/excelo/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/excelo}

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}

# Twilio Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:}

# Logging
logging.level.com.excelo.utilisateurservice=${DEBUG_ENABLED:INFO}
logging.level.org.springframework.security=${DEBUG_ENABLED:INFO}
logging.level.org.keycloak=${DEBUG_ENABLED:INFO}




