# Server
server.port=9001

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/excelo_utilisateur_service-db
spring.datasource.username=postgres
spring.datasource.password=oussama
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Keycloak Configuration
keycloak.admin.server-url=http://localhost:8080
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.realm=excelo
keycloak.client-id=excelo-backend
keycloak.client-secret=your-client-secret

# JWT Configuration
jwt.issuer-uri=http://localhost:8080/realms/excelo
jwt.jwk-set-uri=http://localhost:8080/realms/excelo/protocol/openid-connect/certs

# Twilio Configuration (OTP SMS)
twilio.account-sid=your-account-sid
twilio.auth-token=your-auth-token
twilio.phone-number=+1234567890

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.main.allow-bean-definition-overriding=true
