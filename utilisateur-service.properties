# Server
server.port=9001

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/excelo_utilisateur_service-db
spring.datasource.username=postgres
spring.datasource.password=oussama
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.main.allow-bean-definition-overriding=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Keycloak Configuration
keycloak.auth-server-url=http://localhost:8080
keycloak.realm=excelo
keycloak.admin.username=admin
keycloak.admin.password=ExceloAdmin2025!
keycloak.client.mobile.id=excelo-mobile-app
keycloak.client.mobile.secret=${KEYCLOAK_MOBILE_CLIENT_SECRET:your-mobile-client-secret}
keycloak.client.backoffice.id=excelo-backoffice
keycloak.client.backoffice.secret=${KEYCLOAK_BACKOFFICE_CLIENT_SECRET:your-backoffice-client-secret}

# OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/excelo
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/excelo/protocol/openid-connect/certs

# Twilio Configuration
twilio.account-sid=${TWILIO_ACCOUNT_SID:your-account-sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your-auth-token}
twilio.phone-number.sms=${TWILIO_SMS_NUMBER:+1234567890}
twilio.phone-number.whatsapp=${TWILIO_WHATSAPP_NUMBER:+1234567890}

# OTP Configuration
app.otp.expiry-minutes=5
app.otp.max-attempts=5
app.otp.rate-limit-per-hour=5

# Cache Configuration
spring.cache.cache-names=otpCache,rateLimitCache
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m