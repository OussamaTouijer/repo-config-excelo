# ===============================
# CONFIGURATION UTILISATEUR-SERVICE SPĂ‰CIFIQUE
# Les configurations communes sont dans application.properties
# ===============================

server.port=9001

# ===============================
# BASE DE DONNĂ‰ES POSTGRESQL - SPĂ‰CIFIQUE
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:excelo_utilisateur_service-db}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate - SPĂ‰CIFIQUE
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# CONFIGURATION KEYCLOAK
# ===============================
keycloak.realm=${KEYCLOAK_REALM:excelo}
keycloak.auth-server-url=${KEYCLOAK_SERVER_URL:http://localhost:8080}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:excelo-app}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
keycloak.public-client=${KEYCLOAK_PUBLIC_CLIENT:true}
keycloak.bearer-only=${KEYCLOAK_BEARER_ONLY:false}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}

# ===============================
# CONFIGURATION KEYCLOAK EXCELO
# ===============================
excelo.keycloak.enabled=${KEYCLOAK_ENABLED:true}
excelo.keycloak.realm=${KEYCLOAK_REALM:excelo}
excelo.keycloak.auth-server-url=${KEYCLOAK_SERVER_URL:http://localhost:8080}
excelo.keycloak.client-id=${KEYCLOAK_CLIENT_ID:excelo-app}
excelo.keycloak.use-resource-role-mappings=${KEYCLOAK_USE_RESOURCE_ROLES:true}
excelo.keycloak.verify-token-audience=${KEYCLOAK_VERIFY_TOKEN_AUDIENCE:true}
excelo.keycloak.connection-pool-size=${KEYCLOAK_CONNECTION_POOL_SIZE:20}
excelo.keycloak.connection-timeout=${KEYCLOAK_CONNECTION_TIMEOUT:10s}
excelo.keycloak.read-timeout=${KEYCLOAK_READ_TIMEOUT:10s}
excelo.keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
excelo.keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}
excelo.keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
excelo.keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}

# ===============================
# CONFIGURATION TWILIO
# ===============================
twilio.accountSid=${TWILIO_ACCOUNT_SID:}
twilio.authToken=${TWILIO_AUTH_TOKEN:}
twilio.phoneNumber=${TWILIO_PHONE_NUMBER:}
twilio.whatsappFrom=${TWILIO_WHATSAPP_FROM:}

# ===============================
# REDIS CACHE CONFIGURATION - SPĂ‰CIFIQUE
# ===============================
spring.data.redis.database=1

# Configuration cache Redis - SPĂ‰CIFIQUE
spring.cache.redis.time-to-live=1200000
spring.cache.redis.key-prefix=utilisateur-service:
