# Server Configuration
server.port=8888

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Spring Cloud Gateway Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Routes Configuration
spring.cloud.gateway.routes[0].id=utilisateur-service
spring.cloud.gateway.routes[0].uri=lb://utilisateur-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/utilisateurs/**,/api/auth/**,/api/otp/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[1].id=contenu-service
spring.cloud.gateway.routes[1].uri=lb://contenu-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/albums/**,/api/joueurs/**,/api/collections/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[2].id=campagne-service
spring.cloud.gateway.routes[2].uri=lb://campagne-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/campagnes/**,/api/codes/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[3].id=echange-service
spring.cloud.gateway.routes[3].uri=lb://echange-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/echanges/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[5].id=recompense-service
spring.cloud.gateway.routes[5].uri=lb://recompense-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/recompenses/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[6].id=analytique-service
spring.cloud.gateway.routes[6].uri=lb://analytique-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/analytics/**,/api/evenements/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=0

# Security Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/excelo}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/excelo/protocol/openid-connect/certs}

# CORS Configuration
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].maxAge=3600

# Logging Configuration
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG