# Server Configuration
server.port=8888

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Spring Cloud Gateway Configuration - Routage Dynamique Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=false
spring.cloud.gateway.discovery.locator.include-expression=true

# Configuration du routage dynamique avec noms lowercase (par défaut)
# URLs d'accès : http://gateway:8888/utilisateur-service/auth/login
# Format : http://gateway:8888/{service-name}/{endpoint}
# Note: Les services sont automatiquement convertis en lowercase par Spring Cloud Gateway

# Filtres globaux pour le routage dynamique
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
spring.cloud.gateway.default-filters[1]=AddRequestHeader=X-Gateway-Request-Id,${random.uuid}
spring.cloud.gateway.default-filters[2]=AddRequestHeader=X-Forwarded-Host,${spring.cloud.client.hostname}

# Routes Configuration dynamiques via Eureka
# Les microservices sont automatiquement découverts et routés via leurs noms Eureka

# Load Balancing pour le routage dynamique
spring.cloud.loadbalancer.ribbon.enabled=false
spring.cloud.gateway.loadbalancer.use404=true

# Configuration des timeouts pour les routes dynamiques
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=30s
spring.cloud.gateway.httpclient.pool.max-connections=100

# Circuit Breaker global pour la résilience
spring.cloud.circuitbreaker.hystrix.enabled=false
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=30s

# Retry configuration globale
spring.cloud.gateway.default-filters[3]=Retry=3

# Security Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/excelo}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/excelo/protocol/openid-connect/certs}

# CORS Configuration - Corrigé pour éviter les conflits allowCredentials/allowedOrigins
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=false
spring.cloud.gateway.globalcors.corsConfigurations.[/**].maxAge=3600

# Monitoring et Observabilité pour routage dynamique
management.endpoints.web.exposure.include=health,info,gateway,routes
management.endpoint.gateway.enabled=true
management.metrics.export.prometheus.enabled=true
spring.cloud.gateway.metrics.enabled=true

# Logging Configuration
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.cloud.loadbalancer=DEBUG
logging.level.com.netflix.discovery=INFO
