# ===============================
# CONFIGURATION ANALYTIQUE-SERVICE SPÉCIFIQUE
# Tableaux de bord temps réel selon R-BO-004
# Les configurations communes sont dans application.properties
# ===============================

server.port=9006

# ===============================
# BASE DE DONNÉES POSTGRESQL - SPÉCIFIQUE
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME_A:excelo_analytique_service-db}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration du pool de connexions HikariCP - SPÉCIFIQUE
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate - SPÉCIFIQUE À CE SERVICE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# REDIS CACHE CONFIGURATION - SPÉCIFIQUE
# ===============================
spring.data.redis.database=3

# Pool de connexions Redis - SPÉCIFIQUE
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=2
spring.data.redis.jedis.pool.max-wait=2000ms

# Configuration cache Redis - SPÉCIFIQUE
spring.cache.redis.time-to-live=300000
spring.cache.redis.key-prefix=analytique-service:

# ===============================
# CONFIGURATION OPENFEIGN - SPÉCIFIQUE
# ===============================
# Client URLs
services.contenu-service.url=${CONTENU_SERVICE_URL:http://localhost:8082}
services.campagne-service.url=${CAMPAGNE_SERVICE_URL:http://localhost:8084}
services.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8086}

# Configuration Feign spécifique
feign.client.config.default.logger-level=basic

# ===============================
# ACTUATOR & MONITORING
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=false
management.health.db.enabled=true

# ===============================
# CONFIGURATION LOGGING
# ===============================
logging.level.com.excelo.analytiqueservice=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.cache=DEBUG
logging.level.feign=DEBUG

# ===============================
# CONFIGURATION SWAGGER/OPENAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.info.title=Analytique Service API
springdoc.info.description=API pour analytics et tableaux de bord temps réel selon R-BO-004
springdoc.info.version=1.0.0

# ===============================
# CONFIGURATION TÂCHES PROGRAMMÉES
# ===============================
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20

# ===============================
# CONFIGURATION ANALYTICS SPÉCIFIQUE
# ===============================
# Rétention des données
analytics.retention.events.days=30
analytics.retention.stats.days=365

# Fréquences de calcul
analytics.calculation.rarity-scores.cron=0 0 */2 * * *
analytics.calculation.rankings.cron=0 */30 * * * *
analytics.calculation.trending.cron=0 */15 * * * *

# Configuration temps réel R-BO-004
analytics.realtime.buffer-size=1000
analytics.realtime.flush-interval=5s
analytics.realtime.max-events-per-minute=10000