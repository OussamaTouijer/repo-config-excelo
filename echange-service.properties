# ===============================
# CONFIGURATION ECHANGE-SERVICE SPÉCIFIQUE
# Les configurations communes sont dans application.properties
# ===============================

server.port=9004

# ===============================
# BASE DE DONNÉES POSTGRESQL - SPÉCIFIQUE
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:excelo_echange_service-db}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA - SPÉCIFIQUE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# ===============================
# CONFIGURATION FEIGN CLIENTS - SPÉCIFIQUE
# ===============================
services.contenu-service.url=${CONTENU_SERVICE_URL:http://localhost:9003}
services.utilisateur-service.url=${UTILISATEUR_SERVICE_URL:http://localhost:9001}

# ===============================
# CONFIGURATION WEBSOCKET
# ===============================
spring.websocket.allowed-origins=*

# ===============================
# CONFIGURATION LOGGING
# ===============================
logging.level.com.excelo.echangeservice=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# REDIS CACHE CONFIGURATION
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.database=3

# Configuration cache Redis avec TTL optimisés
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=echange-service:

# ===============================
# CONFIGURATION ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# CONFIGURATION SWAGGER
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# CONFIGURATION FEIGN DÉTAILLÉE
# ===============================
feign.client.config.default.connect-timeout=10000
feign.client.config.default.read-timeout=10000
feign.client.config.default.logger-level=FULL
feign.httpclient.enabled=true
feign.compression.request.enabled=true
feign.compression.response.enabled=true

# Configuration spécifique pour UTILISATEUR-SERVICE
feign.client.config.UTILISATEUR-SERVICE.connect-timeout=15000
feign.client.config.UTILISATEUR-SERVICE.read-timeout=15000
feign.client.config.UTILISATEUR-SERVICE.logger-level=FULL

# Configuration spécifique pour CONTENU-SERVICE  
feign.client.config.CONTENU-SERVICE.connect-timeout=15000
feign.client.config.CONTENU-SERVICE.read-timeout=15000
feign.client.config.CONTENU-SERVICE.logger-level=FULL

# Logging pour Feign clients (aide au debugging)
logging.level.com.excelo.echangeservice.client.UtilisateurServiceClient=DEBUG
logging.level.com.excelo.echangeservice.client.ContenuServiceClient=DEBUG
logging.level.feign=DEBUG