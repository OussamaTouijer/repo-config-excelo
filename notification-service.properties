# ===============================
# CONFIGURATION NOTIFICATION-SERVICE SPÉCIFIQUE
# Les configurations communes sont dans application.properties
# ===============================

server.port=8088

# ===============================
# BASE DE DONNÉES POSTGRESQL - SPÉCIFIQUE
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME_N:excelo_notification_db}
# UTILISATEUR SPÉCIFIQUE POUR CE SERVICE
spring.datasource.username=excelo_user
spring.datasource.password=${DB_PASSWORD:excelo_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate - SPÉCIFIQUE
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONFIGURATION FIREBASE (R-NOTIF-003)
# ===============================
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY:}
firebase.project-id=${FIREBASE_PROJECT_ID:excelo-app-dev}
firebase.database-url=${FIREBASE_DATABASE_URL:}

# ===============================
# CONFIGURATION NOTIFICATIONS (R-NOTIF-001)
# ===============================
notification.daily-limit=3
notification.boost-daily-limit=2
notification.default-expiration-hours=24
notification.max-retries=3
notification.retry-delay-minutes=5
notification.default-proximity-radius-meters=1000
notification.cleanup-after-days=30

# ===============================
# REDIS CACHE CONFIGURATION - SPÉCIFIQUE
# ===============================
# Activer/désactiver Redis - SPÉCIFIQUE À CE SERVICE
redis.enabled=${REDIS_ENABLED:true}
spring.data.redis.database=1

# Configuration cache Redis - SPÉCIFIQUE
spring.cache.redis.time-to-live=3600000
spring.cache.redis.key-prefix=notification-service:

# Disable Redis health indicator when Redis is disabled - SPÉCIFIQUE
management.health.redis.enabled=false

# ===============================
# CONFIGURATION SWAGGER/OPENAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# CONFIGURATION LOGGING
# ===============================
logging.level.com.excelo.notificationservice=DEBUG
logging.level.com.google.firebase=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# CONFIGURATION TÂCHES PROGRAMMÉES
# ===============================
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=100

# ===============================
# CONFIGURATION VALIDATION
# ===============================
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

# ===============================
# CONFIGURATION JACKSON JSON
# ===============================
spring.jackson.time-zone=Europe/Paris
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss