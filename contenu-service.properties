# ===============================
# CONFIGURATION CONTENU-SERVICE SPÉCIFIQUE
# Les configurations communes sont dans application.properties
# ===============================

server.port=9003

# ===============================
# BASE DE DONNÉES POSTGRESQL - SPÉCIFIQUE
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME_CO:excelo_contenu_service-db}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate - SPÉCIFIQUE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# REDIS CACHE CONFIGURATION - SPÉCIFIQUE
# ===============================
# Activer/désactiver Redis - SPÉCIFIQUE À CE SERVICE
redis.enabled=${REDIS_ENABLED:true}
spring.data.redis.database=2
spring.data.redis.connect-timeout=5000ms

# Configuration de la résilience Redis - SPÉCIFIQUE
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms
spring.data.redis.lettuce.shutdown-timeout=100ms

# Configuration cache Redis - SPÉCIFIQUE
spring.cache.redis.time-to-live=600000
spring.cache.redis.key-prefix=contenu-service:

# ===============================
# CONFIGURATION EUREKA
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# CONFIGURATION OPENFEIGN
# ===============================
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000
spring.cloud.openfeign.client.config.campagne-service.url=${CAMPAGNE_SERVICE_URL:http://localhost:9002}

# ===============================
# SÉCURITÉ JWT/KEYCLOAK
# ===============================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/excelo/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/excelo}

# ===============================
# CONFIGURATION LOGGING
# ===============================
logging.level.com.excelo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# CONFIGURATION SWAGGER/OPENAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===============================
# CONFIGURATION ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ===============================
# CONFIGURATION TÂCHES PROGRAMMÉES
# ===============================
app.scheduler.rare-card-injection.enabled=true
app.scheduler.rare-card-injection.cron=0 0 */6 * * *

# ===============================
# CONFIGURATION STOCKAGE IMAGES (R-PLAYER-003)
# ===============================
app.storage.images.base-url=${IMAGES_BASE_URL:http://localhost:9003/images}
app.storage.images.max-size=2MB
app.storage.images.allowed-formats=jpg,jpeg,png
app.storage.images.min-width=300
app.storage.images.min-height=400

# ===============================
# CONFIGURATION PROBABILITÉS JOUEURS
# ===============================
app.player.probabilities.n1=0.60
app.player.probabilities.n2=0.30
app.player.probabilities.n3=0.10
app.player.probabilities.rare-card-threshold=0.80

# ===============================
# CONFIGURATION SEUILS COMPLÉTION (R-002)
# ===============================
app.completion.thresholds.no-duplicates=0.50
app.completion.thresholds.duplicates-start=0.50
app.completion.thresholds.duplicates-max=0.80
app.completion.thresholds.rare-cards=0.80

# ===============================
# CONFIGURATION PAGINATION
# ===============================
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# ===============================
# CONFIGURATION VALIDATION
# ===============================
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
