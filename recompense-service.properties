# ===============================
# CONFIGURATION RECOMPENSE-SERVICE SPÉCIFIQUE
# Les configurations communes sont dans application.properties
# ===============================

server.port=9007

# ===============================
# BASE DE DONNÉES POSTGRESQL - SPÉCIFIQUE (VARIABLES DIFFÉRENTES)
# ===============================
# CE SERVICE UTILISE DES VARIABLES DB DIFFÉRENTES
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/excelo_recompenses_service-db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:oussama}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA - SPÉCIFIQUE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===============================
# REDIS CACHE CONFIGURATION - SPÉCIFIQUE
# ===============================
spring.data.redis.database=4

# Configuration cache Redis - SPÉCIFIQUE
spring.cache.redis.time-to-live=900000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=recompense-service:

# ===============================
# CONFIGURATION ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ===============================
# CONFIGURATION OPENAPI/SWAGGER
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# CONFIGURATION FEIGN
# ===============================
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=10000
feign.client.config.default.logger-level=basic

# ===============================
# CONFIGURATION TÂCHES PROGRAMMÉES
# ===============================
spring.task.scheduling.pool.size=2

# ===============================
# CONFIGURATION LOGGING
# ===============================
logging.level.com.excelo.recompenseservice=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] - %msg%n

# ===============================
# CONFIGURATION MÉTIER RÉCOMPENSES
# ===============================
excelo.rewards.auto-detection.enabled=true
excelo.rewards.cleanup.enabled=true
excelo.rewards.notification.enabled=true