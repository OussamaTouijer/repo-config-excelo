# Server
server.port=9002

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/excelo_compagne_service-db
spring.datasource.username=postgres
spring.datasource.password=oussama
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.main.allow-bean-definition-overriding=true

# Keycloak Configuration
keycloak.auth-server-url=http://localhost:8080
keycloak.realm=excelo

# JWT Configuration
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

# Security Logging
logging.level.org.springframework.security=DEBUG