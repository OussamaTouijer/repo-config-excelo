# ===============================
# CONFIGURATION CAMPAGNE-SERVICE SPÉCIFIQUE
# Les configurations communes sont dans application.properties
# ===============================

server.port=9002

# ===============================
# BASE DE DONNÉES POSTGRESQL - SPÉCIFIQUE
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:excelo_campagne_service-db}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - SPÉCIFIQUE
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# REDIS CACHE CONFIGURATION - SPÉCIFIQUE
# ===============================
spring.data.redis.database=2

# Configuration cache Redis - SPÉCIFIQUE
spring.cache.redis.time-to-live=1800000
spring.cache.redis.key-prefix=campagne-service:

# ===============================
# CONFIGURATION OPENFEIGN - SPÉCIFIQUE
# ===============================
services.contenu-service.url=${CONTENU_SERVICE_URL:http://localhost:9003}

# ===============================
# SÉCURITÉ KEYCLOAK - SPÉCIFIQUE
# ===============================
keycloak.auth-server-url=${KEYCLOAK_SERVER_URL:http://localhost:8080}
keycloak.realm=excelo
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

# ===============================
# CONFIGURATION LOGGING - SPÉCIFIQUE
# ===============================
logging.level.org.springframework.security=DEBUG